<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barça Ultimate Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo-area" onclick="location.reload()" style="cursor: pointer;">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/47/FC_Barcelona_%28crest%29.svg/250px-FC_Barcelona_%28crest%29.svg.png" class="barca-logo">
            <h2>BARÇA HUB</h2>
        </div>
        <nav>
            <button class="nav-btn active-btn" onclick="showSection('fixtures')"><i class="fas fa-calendar-alt"></i> Matches</button>
            <button class="nav-btn" onclick="showSection('table')"><i class="fas fa-table"></i> La Liga</button>
            <button class="nav-btn" onclick="showSection('scorers')"><i class="fas fa-running"></i> Scorers</button>
            <button class="nav-btn" onclick="showSection('news')"><i class="fas fa-newspaper"></i> News</button>
        </nav>
        
        <div class="theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="checkbox" onchange="toggleTheme()">
                <div class="slider round"></div>
            </label>
            <span id="theme-text">Dark Mode</span>
        </div>
    </div>

    <main class="content">
        <section id="fixtures" class="tab-content active">
            <h1 class="section-title">Upcoming Matches</h1>
            <div id="fixtures-container"></div>
        </section>

        <section id="table" class="tab-content">
            <h1 class="section-title">La Liga Standings</h1>
            <div class="card table-card">
                <div id="table-container"></div>
            </div>
        </section>

        <section id="scorers" class="tab-content">
            <h1 class="section-title">Top Scorers</h1>
            <div id="scorers-container" class="scorers-grid"></div>
        </section>

        <section id="news" class="tab-content">
            <h1 class="section-title">Latest News</h1>
            <div id="news-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
