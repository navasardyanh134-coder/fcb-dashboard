<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Barcelona | Premium Dashboard</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28logo%29.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28logo%29.svg" alt="Barca Logo" class="logo-img">
            <h1>MÉS QUE UN CLUB</h1>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 class="glitch" data-text="VISCA EL BARÇA">VISCA EL BARÇA</h2>
            <p>Պաշտոնական վիճակագրություն և նորություններ</p>
        </div>
    </header>

    <main class="dashboard">
        <section class="glass-card fade-in">
            <div class="card-header">
                <h3>📅 Հաջորդ Հանդիպումները</h3>
            </div>
            <div id="matches-container" class="card-body"></div>
        </section>

        <section class="glass-card fade-in delay-1">
            <div class="card-header">
                <h3>📰 Թարմ Լուրեր</h3>
            </div>
            <div id="news-container" class="card-body"></div>
        </section>

        <section class="glass-card premium-card fade-in delay-2">
            <div class="card-header gold-text">
                <h3>👑 Բոլոր Ժամանակների Լավագույնը</h3>
            </div>
            <div class="goat-section">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.jpg" alt="Lionel Messi" class="goat-img">
                <div class="goat-info">
                    <h4>Լիոնել Մեսսի (D10S)</h4>
                    <ul>
                        <li><strong>Գոլեր Բարսայում:</strong> 672</li>
                        <li><strong>Ոսկե Գնդակ:</strong> 8</li>
                        <li><strong>Կարգավիճակ:</strong> Ֆուտբոլի Աստված</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
