<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCB Stats Dashboard | Hayk Navasardyan</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_(logo).svg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_(logo).svg" alt="FCB Logo" width="80">
        <h1>FCB DASHBOARD</h1>
    </header>

    <main class="dashboard-container">
        <section class="card">
            <h3>Լավագույն ռմբարկուներ</h3>
            <div class="chart-container">
                <canvas id="scorersChart"></canvas>
            </div>
        </section>

        <section class="card">
            <h3>Հաջորդ հանդիպումները</h3>
            <div id="matches-list">
                <p class="loading">Բեռնվում է...</p>
            </div>
        </section>

        <section class="card">
            <h3>Թարմ Լուրեր (ESPN)</h3>
            <div id="news-list">
                <p class="loading">Բեռնվում է...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
